name: export-ci-env
description: Export a standardized CI environment profile into GITHUB_ENV.

inputs:
  profile:
    description: Environment export profile name.
    required: true
  build_type:
    description: Optional build type argument for build-matrix profile.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        write_env() {
          printf '%s=%s\n' "$1" "$2" >> "$GITHUB_ENV"
        }

        profile="${{ inputs.profile }}"
        build_type="${{ inputs.build_type }}"

        case "$profile" in
          strict)
            write_env "WH_CI_STRICT" "1"
            ;;
          strict-clang)
            write_env "WH_CI_STRICT" "1"
            write_env "CC" "clang"
            write_env "CXX" "clang++"
            ;;
          build-matrix)
            if [[ -z "$build_type" ]]; then
              echo "[export-ci-env] FAIL build-matrix requires build_type"
              exit 2
            fi
            write_env "WH_CI_STRICT" "1"
            write_env "WH_CI_BUILD_TYPE" "$build_type"
            write_env "CC" "clang"
            write_env "CXX" "clang++"
            ;;
          *)
            echo "[export-ci-env] FAIL unknown profile: $profile"
            exit 2
            ;;
        esac

        echo "[export-ci-env] PASS $profile"
