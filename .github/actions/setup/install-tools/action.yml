name: install-ci-tools
description: Install the selected CI tool profile on the current runner.

inputs:
  profile:
    description: Tool profile to install, for example fast-gates or build.
    required: true

runs:
  using: composite
  steps:
    - if: runner.os == 'Linux'
      shell: bash
      run: bash "${{ github.workspace }}/scripts/ci/setup/install_linux_tools.sh" "${{ inputs.profile }}"

    - if: runner.os == 'macOS'
      shell: bash
      run: bash "${{ github.workspace }}/scripts/ci/setup/install_macos_tools.sh" "${{ inputs.profile }}"

    - if: runner.os == 'Windows'
      shell: pwsh
      run: '& "${{ github.workspace }}/scripts/ci/setup/install_windows_tools.ps1" -Profile "${{ inputs.profile }}"'
