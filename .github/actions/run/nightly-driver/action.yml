name: run-nightly-driver
description: Run the nightly CMake test driver for a sanitizer mode or label suite.

inputs:
  mode:
    description: nightly driver mode, for example sanitizer or label.
    required: true
  value:
    description: nightly driver selector, for example asan or stress.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: bash "${{ github.workspace }}/scripts/nightly/nightly_cmake_test_driver.sh" "${{ inputs.mode }}" "${{ inputs.value }}"
