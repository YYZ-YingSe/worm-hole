name: run-coverage-gate
description: Run the coverage build, tests, and coverage threshold gate.

inputs:
  coverage_min_lines:
    description: Minimum acceptable line coverage ratio.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - if: inputs.coverage_min_lines != ''
      shell: bash
      run: printf '%s=%s\n' "WH_COVERAGE_MIN_LINES" "${{ inputs.coverage_min_lines }}" >> "$GITHUB_ENV"

    - shell: bash
      run: bash "${{ github.workspace }}/scripts/ci/jobs/run_coverage_gate.sh"
