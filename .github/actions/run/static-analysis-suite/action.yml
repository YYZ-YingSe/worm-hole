name: run-static-analysis-suite
description: Select the clang-tidy toolchain and run the full static analysis suite.

inputs:
  select_toolchain:
    description: Whether to preselect a versioned clang-tidy toolchain.
    required: false
    default: "true"
  mode:
    description: Which static-analysis stage to run: clang-tidy, backend, or full.
    required: false
    default: "full"
  path_filter:
    description: ripgrep filter used by clang-tidy source discovery.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - if: inputs.select_toolchain == 'true'
      shell: bash
      run: bash "${{ github.workspace }}/scripts/ci/setup/select_clang_tidy_toolchain.sh"

    - if: inputs.mode == 'clang-tidy'
      shell: bash
      env:
        WH_CLANG_TIDY_PATH_FILTER: ${{ inputs.path_filter }}
      run: bash "${{ github.workspace }}/scripts/ci/jobs/run_clang_tidy_entry.sh"

    - if: inputs.mode == 'backend'
      shell: bash
      run: |
        bash "${{ github.workspace }}/scripts/ci/checks/run_cppcheck.sh"
        bash "${{ github.workspace }}/scripts/ci/jobs/run_clang_scan_build.sh"

    - if: inputs.mode == 'full'
      shell: bash
      run: bash "${{ github.workspace }}/scripts/ci/jobs/run_static_analysis_suite.sh"
