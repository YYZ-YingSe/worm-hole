name: ci-03-deep-quality

on:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_MAX_BUILD_ACTIONS_PER_SHARD: "200"

concurrency:
  group: deep-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: clang-tidy (${{ matrix.shard_index }})
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - shard_count: 4
            shard_index: 0
          - shard_count: 4
            shard_index: 1
          - shard_count: 4
            shard_index: 2
          - shard_count: 4
            shard_index: 3

    uses: ./.github/workflows/reusable-analysis.yml
    with:
      mode: clang-tidy
      runner_os: ubuntu-latest
      configure_preset: ci-static-analysis
      install_profile: analysis
      shard_count: ${{ matrix.shard_count }}
      shard_index: ${{ matrix.shard_index }}
      timeout_minutes: 60

  codechecker:
    uses: ./.github/workflows/reusable-analysis.yml
    with:
      mode: codechecker
      runner_os: ubuntu-latest
      configure_preset: ci-static-analysis
      install_profile: analysis
      setup_codechecker: true
      timeout_minutes: 60

  plan-sanitizer:
    name: plan sanitizer matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Plan sanitizer matrix
        id: plan
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          matrix_path="${RUNNER_TEMP}/sanitizer-matrix.json"
          "$python_bin" scripts/toolchain.py ci emit-test-matrix \
            --config .github/matrices/sanitizer.json \
            --max-build-actions-per-shard "${CI_MAX_BUILD_ACTIONS_PER_SHARD}" \
            --output "$matrix_path"
          echo "matrix=$(tr -d '\n' < "$matrix_path")" >> "$GITHUB_OUTPUT"

  sanitizer:
    name: sanitizer (${{ matrix.name }}, ${{ matrix.shard_index }}/${{ matrix.shard_count }}, ${{ matrix.target_count }} targets, ~${{ matrix.estimated_build_actions }} actions)
    needs: plan-sanitizer
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.plan-sanitizer.outputs.matrix) }}
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      mode: sanitizer
      runner_os: ubuntu-latest
      install_profile: build
      configure_preset: ${{ matrix.configure_preset }}
      build_preset: ${{ matrix.build_preset }}
      shard_count: ${{ matrix.shard_count }}
      shard_index: ${{ matrix.shard_index }}
      timeout_minutes: 60
