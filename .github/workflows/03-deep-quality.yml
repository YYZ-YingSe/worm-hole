name: ci-03-deep-quality

on:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: deep-analysis
          env_profile: strict

      - name: Run static analysis suite
        uses: ./.github/actions/run/static-analysis-suite

  sanitizer-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build
          env_profile: strict-clang

      - name: Setup ccache
        uses: ./.github/actions/setup/ccache
        with:
          dir: ${{ github.workspace }}/.ccache/deep-quality-sanitizer
          key_stem: ccache-deep-quality-sanitizer-${{ runner.os }}
          restore_keys: |
            ccache-deep-quality-sanitizer-${{ runner.os }}-

      - name: Run sanitizer smoke
        uses: ./.github/actions/run/sanitizer-smoke
