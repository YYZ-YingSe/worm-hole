name: ci-03-deep-quality

on:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: compose
            path_filter: '^(tests/UT/wh/compose/)'
          - name: foundations
            path_filter: '^(tests/helper/|tests/UT/wh/(callbacks|core|internal|schema)/)'
          - name: surface
            path_filter: '^(tests/UT/wh/(adk|agent|document|embedding|flow|indexer|model|net|output|prompt|retriever|scheduler|sync|tool|workflow)/|tests/UT/wh/flow_ut\.cpp)'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: deep-analysis
          env_profile: strict

      - name: Run clang-tidy shard ${{ matrix.shard.name }}
        uses: ./.github/actions/run/static-analysis-suite
        with:
          select_toolchain: "true"
          mode: clang-tidy
          path_filter: ${{ matrix.shard.path_filter }}

  static-analysis-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: deep-analysis
          env_profile: strict

      - name: Run cppcheck and scan-build
        uses: ./.github/actions/run/static-analysis-suite
        with:
          select_toolchain: "true"
          mode: backend

  sanitizer-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build
          env_profile: strict-clang

      - name: Setup ccache
        uses: ./.github/actions/setup/ccache
        with:
          dir: ${{ github.workspace }}/.ccache/deep-quality-sanitizer
          key_stem: ccache-deep-quality-sanitizer-${{ runner.os }}
          restore_keys: |
            ccache-deep-quality-sanitizer-${{ runner.os }}-

      - name: Run sanitizer smoke
        uses: ./.github/actions/run/sanitizer-smoke
