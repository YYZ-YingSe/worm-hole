name: ci-03-deep-quality

on:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: clang-tidy (${{ matrix.shard_index }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_count: 4
            shard_index: 0
          - shard_count: 4
            shard_index: 1
          - shard_count: 4
            shard_index: 2
          - shard_count: 4
            shard_index: 3

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: analysis

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Select clang toolchain
        shell: bash
        run: bash "${{ github.workspace }}/scripts/ci/setup/select_clang_tidy_toolchain.sh"

      - name: Run clang-tidy shard ${{ matrix.shard_index }}
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          "$python_bin" scripts/toolchain.py ci clang-tidy \
            --configure-preset ci-static-analysis \
            --shard-count "${{ matrix.shard_count }}" \
            --shard-index "${{ matrix.shard_index }}"

  codechecker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: analysis
          setup_codechecker: "true"

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Select clang toolchain
        shell: bash
        run: bash "${{ github.workspace }}/scripts/ci/setup/select_clang_tidy_toolchain.sh"

      - name: Run CodeChecker
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          "$python_bin" scripts/toolchain.py ci codechecker --configure-preset ci-static-analysis

  sanitizer:
    name: sanitizer (${{ matrix.name }}, ${{ matrix.shard_index }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            configure_preset: ci-asan-ubsan
            build_preset: ci-asan-ubsan
            shard_count: 2
            shard_index: 0
          - name: asan-ubsan
            configure_preset: ci-asan-ubsan
            build_preset: ci-asan-ubsan
            shard_count: 2
            shard_index: 1
          - name: tsan
            configure_preset: ci-tsan
            build_preset: ci-tsan
            shard_count: 1
            shard_index: 0

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Run sanitizer shard ${{ matrix.shard_index }}
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          "$python_bin" scripts/toolchain.py ci sanitizer \
            --configure-preset "${{ matrix.configure_preset }}" \
            --build-preset "${{ matrix.build_preset }}" \
            --shard-count "${{ matrix.shard_count }}" \
            --shard-index "${{ matrix.shard_index }}"
