name: ci-04-security-coverage

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: security-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  codeql:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build for CodeQL extraction
        uses: ./.github/actions/run/codeql-build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        continue-on-error: true

  sca:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Run dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Run Trivy FS SCA
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'
          skip-dirs: thirdy_party,build

  coverage:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: coverage
          env_profile: strict-clang

      - name: Setup ccache
        uses: ./.github/actions/setup/ccache
        with:
          dir: ${{ github.workspace }}/.ccache/coverage
          key_stem: ccache-coverage-${{ runner.os }}
          restore_keys: |
            ccache-coverage-${{ runner.os }}-

      - name: Run coverage gate
        uses: ./.github/actions/run/coverage-gate
        with:
          coverage_min_lines: "0.70"
