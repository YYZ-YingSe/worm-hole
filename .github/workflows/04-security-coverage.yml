name: ci-04-security-coverage

on:
  pull_request:
  push:
    branches:
      - main
      - feature
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  CI_MAX_BUILD_ACTIONS_PER_SHARD: "200"

concurrency:
  group: security-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sca:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false
          fetch-depth: 0

      - name: Run dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      - name: Run Trivy FS SCA
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,license
          vuln-type: library
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: thirdy_party,build

  plan-coverage:
    if: github.event_name != 'pull_request'
    name: plan coverage matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: coverage

      - name: Plan coverage matrix
        id: plan
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          matrix_path="${RUNNER_TEMP}/coverage-matrix.json"
          "$python_bin" scripts/toolchain.py ci emit-test-matrix \
            --config .github/matrices/coverage.json \
            --max-build-actions-per-shard "${CI_MAX_BUILD_ACTIONS_PER_SHARD}" \
            --output "$matrix_path"
          echo "matrix=$(tr -d '\n' < "$matrix_path")" >> "$GITHUB_OUTPUT"

  coverage-shard:
    if: github.event_name != 'pull_request'
    name: coverage (${{ matrix.shard_index }}/${{ matrix.shard_count }}, ${{ matrix.target_count }} targets, ~${{ matrix.estimated_build_actions }} actions)
    needs: plan-coverage
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.plan-coverage.outputs.matrix) }}
    uses: ./.github/workflows/reusable-coverage-shard.yml
    with:
      runner_os: ubuntu-latest
      configure_preset: ${{ matrix.configure_preset }}
      build_preset: ${{ matrix.build_preset }}
      shard_count: ${{ matrix.shard_count }}
      shard_index: ${{ matrix.shard_index }}
      timeout_minutes: 45

  coverage-aggregate:
    if: github.event_name != 'pull_request'
    name: coverage gate
    needs:
      - plan-coverage
      - coverage-shard
    uses: ./.github/workflows/reusable-coverage-aggregate.yml
    with:
      runner_os: ubuntu-latest
      coverage_min_lines: 0.70
      timeout_minutes: 45
