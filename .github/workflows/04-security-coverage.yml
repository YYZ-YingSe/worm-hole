name: ci-04-security-coverage

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: security-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  codeql:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build for CodeQL extraction
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          "$python_bin" scripts/toolchain.py ci codeql-build --configure-preset ci-codeql

      - name: Analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

  sca:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false
          fetch-depth: 0

      - name: Run dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      - name: Run Trivy FS SCA
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,license
          vuln-type: library
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: thirdy_party,build

  coverage:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: coverage

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Run coverage gate
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          "$python_bin" scripts/toolchain.py ci coverage \
            --configure-preset ci-coverage \
            --coverage-min-lines 0.70
