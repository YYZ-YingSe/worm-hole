name: ci-02-build-test-matrix

on:
  pull_request:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-test-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test (${{ matrix.name }}, ${{ matrix.shard_index }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-debug
            os: ubuntu-latest
            configure_preset: ci-linux-debug
            build_preset: ci-linux-debug
            shard_count: 4
            shard_index: 0
          - name: ubuntu-debug
            os: ubuntu-latest
            configure_preset: ci-linux-debug
            build_preset: ci-linux-debug
            shard_count: 4
            shard_index: 1
          - name: ubuntu-debug
            os: ubuntu-latest
            configure_preset: ci-linux-debug
            build_preset: ci-linux-debug
            shard_count: 4
            shard_index: 2
          - name: ubuntu-debug
            os: ubuntu-latest
            configure_preset: ci-linux-debug
            build_preset: ci-linux-debug
            shard_count: 4
            shard_index: 3
          - name: ubuntu-release
            os: ubuntu-latest
            configure_preset: ci-linux-release
            build_preset: ci-linux-release
            shard_count: 4
            shard_index: 0
          - name: ubuntu-release
            os: ubuntu-latest
            configure_preset: ci-linux-release
            build_preset: ci-linux-release
            shard_count: 4
            shard_index: 1
          - name: ubuntu-release
            os: ubuntu-latest
            configure_preset: ci-linux-release
            build_preset: ci-linux-release
            shard_count: 4
            shard_index: 2
          - name: ubuntu-release
            os: ubuntu-latest
            configure_preset: ci-linux-release
            build_preset: ci-linux-release
            shard_count: 4
            shard_index: 3
          - name: macos-release
            os: macos-latest
            configure_preset: ci-macos-release
            build_preset: ci-macos-release
            shard_count: 2
            shard_index: 0
          - name: macos-release
            os: macos-latest
            configure_preset: ci-macos-release
            build_preset: ci-macos-release
            shard_count: 2
            shard_index: 1
          - name: windows-release
            os: windows-latest
            configure_preset: ci-windows-release
            build_preset: ci-windows-release
            shard_count: 2
            shard_index: 0
          - name: windows-release
            os: windows-latest
            configure_preset: ci-windows-release
            build_preset: ci-windows-release
            shard_count: 2
            shard_index: 1

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Build and test
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          "$python_bin" scripts/toolchain.py ci build-test \
            --configure-preset "${{ matrix.configure_preset }}" \
            --build-preset "${{ matrix.build_preset }}" \
            --shard-count "${{ matrix.shard_count }}" \
            --shard-index "${{ matrix.shard_index }}" \
            --include-label ci.pr \
            --exclude-label ci.nightly
