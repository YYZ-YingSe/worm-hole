name: ci-02-build-test-matrix

on:
  workflow_dispatch:
    inputs:
      lane_filter:
        description: "Comma-separated lane names to run; use 'all' to run the full matrix."
        required: false
        default: "windows-release"

permissions:
  contents: read

env:
  CI_MAX_BUILD_ACTIONS_PER_SHARD: "200"

concurrency:
  group: build-test-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan-build-test:
    name: plan build-test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Plan build-test matrix
        id: plan
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          matrix_path="${RUNNER_TEMP}/build-test-matrix.json"
          "$python_bin" scripts/toolchain.py ci emit-test-matrix \
            --config .github/matrices/build-test.json \
            --max-build-actions-per-shard "${CI_MAX_BUILD_ACTIONS_PER_SHARD}" \
            --output "$matrix_path"
          lane_filter="${{ inputs.lane_filter }}"
          if [ -n "${lane_filter}" ] && [ "${lane_filter}" != "all" ]; then
            filtered_path="${RUNNER_TEMP}/build-test-matrix.filtered.json"
            "$python_bin" -c 'import json, sys; from pathlib import Path; src, dst, raw_filter = sys.argv[1:]; wanted = {item.strip() for item in raw_filter.split(",") if item.strip()}; payload = json.loads(Path(src).read_text(encoding="utf-8")); payload["include"] = [item for item in payload.get("include", []) if str(item.get("name")) in wanted]; assert payload["include"], f"lane_filter selected no matrix entries: {sorted(wanted)}"; Path(dst).write_text(json.dumps(payload, separators=(",", ":")) + "\n", encoding="utf-8")' "$matrix_path" "$filtered_path" "$lane_filter"
            matrix_path="${filtered_path}"
          fi
          echo "matrix=$(tr -d '\n' < "$matrix_path")" >> "$GITHUB_OUTPUT"

  build-test:
    name: build-test (${{ matrix.name }}, ${{ matrix.shard_index }}/${{ matrix.shard_count }}, ${{ matrix.target_count }} targets, ~${{ matrix.estimated_build_actions }} actions)
    needs: plan-build-test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-build-test.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Enable Windows crash diagnostics
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dumpRoot = Join-Path $env:RUNNER_TEMP "wer-localdumps"
          $artifactRoot = Join-Path $env:RUNNER_TEMP "windows-diagnostics"
          $procdumpRoot = Join-Path $env:RUNNER_TEMP "procdump"
          $procdumpZip = Join-Path $env:RUNNER_TEMP "procdump.zip"
          New-Item -ItemType Directory -Force -Path $dumpRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $procdumpRoot | Out-Null

          Invoke-WebRequest -Uri "https://download.sysinternals.com/files/Procdump.zip" -OutFile $procdumpZip
          Expand-Archive -Path $procdumpZip -DestinationPath $procdumpRoot -Force
          $procdumpExe = Join-Path $procdumpRoot "procdump64.exe"
          if (-not (Test-Path $procdumpExe)) {
            $procdumpExe = Join-Path $procdumpRoot "procdump.exe"
          }
          if (-not (Test-Path $procdumpExe)) {
            throw "ProcDump executable not found under $procdumpRoot"
          }
          "WH_PROCDUMP_EXE=$procdumpExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $procdumpExe -accepteula -ma -i $dumpRoot *>&1 |
            Out-File -FilePath (Join-Path $artifactRoot "procdump-install.txt") -Encoding utf8

          @(
            "dump_root=$dumpRoot"
            "artifact_root=$artifactRoot"
            "procdump_exe=$procdumpExe"
            "matrix_name=${{ matrix.name }}"
            "shard_index=${{ matrix.shard_index }}"
            "shard_count=${{ matrix.shard_count }}"
            "configure_preset=${{ matrix.configure_preset }}"
            "build_preset=${{ matrix.build_preset }}"
          ) | Out-File -FilePath (Join-Path $artifactRoot "diagnostics-context.txt") -Encoding utf8

      - name: Build and test
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            set -x
            log_root="${RUNNER_TEMP}/windows-diagnostics"
            mkdir -p "${log_root}"
            log_file="${log_root}/build-test-${{ matrix.name }}-shard-${{ matrix.shard_index }}.log"
            "$python_bin" scripts/toolchain.py ci build-test \
              --configure-preset "${{ matrix.configure_preset }}" \
              --build-preset "${{ matrix.build_preset }}" \
              --shard-count "${{ matrix.shard_count }}" \
              --shard-index "${{ matrix.shard_index }}" \
              --include-label ci.pr \
              --exclude-label ci.nightly \
              2>&1 | tee "${log_file}"
            exit "${PIPESTATUS[0]}"
          fi

          "$python_bin" scripts/toolchain.py ci build-test \
            --configure-preset "${{ matrix.configure_preset }}" \
            --build-preset "${{ matrix.build_preset }}" \
            --shard-count "${{ matrix.shard_count }}" \
            --shard-index "${{ matrix.shard_index }}" \
            --include-label ci.pr \
            --exclude-label ci.nightly

      - name: Collect Windows diagnostics
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP "windows-diagnostics"
          $dumpRoot = Join-Path $env:RUNNER_TEMP "wer-localdumps"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null

          $eventLog = Join-Path $artifactRoot "application-error-events.txt"
          Get-WinEvent -FilterHashtable @{
            LogName = "Application"
            StartTime = (Get-Date).AddHours(-2)
          } -ErrorAction SilentlyContinue |
            Where-Object {
              $_.ProviderName -in @("Application Error", "Windows Error Reporting")
            } |
            Sort-Object TimeCreated |
            Format-List TimeCreated, ProviderName, Id, LevelDisplayName, Message |
            Out-File -FilePath $eventLog -Encoding utf8
          if ((Get-Item $eventLog).Length -eq 0) {
            "No matching Application Error or Windows Error Reporting events found." |
              Out-File -FilePath $eventLog -Encoding utf8
          }

          $dumpListing = Join-Path $artifactRoot "dump-files.txt"
          if (Test-Path $dumpRoot) {
            Get-ChildItem -Path $dumpRoot -Recurse -Force |
              Select-Object FullName, Length, LastWriteTimeUtc |
              Format-Table -AutoSize |
              Out-File -FilePath $dumpListing -Encoding utf8
            if ((Get-Item $dumpListing).Length -eq 0) {
              "Dump directory exists but contains no dump files: $dumpRoot" |
                Out-File -FilePath $dumpListing -Encoding utf8
            }
          } else {
            "No dump directory found: $dumpRoot" | Out-File -FilePath $dumpListing -Encoding utf8
          }

      - name: Disable Windows crash diagnostics
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP "windows-diagnostics"
          if ($env:WH_PROCDUMP_EXE -and (Test-Path $env:WH_PROCDUMP_EXE)) {
            & $env:WH_PROCDUMP_EXE -accepteula -u *>&1 |
              Out-File -FilePath (Join-Path $artifactRoot "procdump-uninstall.txt") -Encoding utf8
          } else {
            "ProcDump executable not available during cleanup." |
              Out-File -FilePath (Join-Path $artifactRoot "procdump-uninstall.txt") -Encoding utf8
          }

      - name: Upload Windows diagnostics
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-diagnostics-${{ matrix.name }}-${{ matrix.shard_index }}
          path: |
            ${{ runner.temp }}/windows-diagnostics
            ${{ runner.temp }}/wer-localdumps
          if-no-files-found: warn
          retention-days: 7
