name: ci-02-build-test-matrix

on:
  pull_request:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_MAX_BUILD_ACTIONS_PER_SHARD: "200"

concurrency:
  group: build-test-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan-build-test:
    name: plan build-test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Plan build-test matrix
        id: plan
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          matrix_path="${RUNNER_TEMP}/build-test-matrix.json"
          "$python_bin" scripts/toolchain.py ci emit-test-matrix \
            --config .github/matrices/build-test.json \
            --max-build-actions-per-shard "${CI_MAX_BUILD_ACTIONS_PER_SHARD}" \
            --output "$matrix_path"
          echo "matrix=$(tr -d '\n' < "$matrix_path")" >> "$GITHUB_OUTPUT"

  build-test:
    name: build-test (${{ matrix.name }}, ${{ matrix.shard_index }}/${{ matrix.shard_count }}, ${{ matrix.target_count }} targets, ~${{ matrix.estimated_build_actions }} actions)
    needs: plan-build-test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-build-test.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Build and test
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          "$python_bin" scripts/toolchain.py ci build-test \
            --configure-preset "${{ matrix.configure_preset }}" \
            --build-preset "${{ matrix.build_preset }}" \
            --shard-count "${{ matrix.shard_count }}" \
            --shard-index "${{ matrix.shard_index }}" \
            --include-label ci.pr \
            --exclude-label ci.nightly
