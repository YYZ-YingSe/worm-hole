name: ci-02-build-test-matrix

on:
  pull_request:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-test-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
        shard_index: [0, 1, 2, 3, 4, 5]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build
          env_profile: build-matrix
          env_build_type: ${{ matrix.build_type }}

      - name: Setup ccache
        uses: ./.github/actions/setup/ccache
        with:
          dir: ${{ github.workspace }}/.ccache/build-test-${{ matrix.os }}-${{ matrix.build_type }}
          key_stem: ccache-build-test-${{ runner.os }}-${{ matrix.build_type }}
          restore_keys: |
            ccache-build-test-${{ runner.os }}-${{ matrix.build_type }}-
            ccache-build-test-${{ runner.os }}-

      - name: Build and test
        uses: ./.github/actions/run/build-and-test
        env:
          WH_TEST_SHARD_COUNT: "6"
          WH_TEST_SHARD_INDEX: ${{ matrix.shard_index }}
