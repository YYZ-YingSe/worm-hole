name: ci-02-build-test-matrix

on:
  pull_request:
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_MAX_BUILD_ACTIONS_PER_SHARD: "200"

concurrency:
  group: build-test-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan-build-test:
    name: plan build-test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Plan build-test matrix
        id: plan
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          matrix_path="${RUNNER_TEMP}/build-test-matrix.json"
          "$python_bin" scripts/toolchain.py ci emit-test-matrix \
            --config .github/matrices/build-test.json \
            --max-build-actions-per-shard "${CI_MAX_BUILD_ACTIONS_PER_SHARD}" \
            --output "$matrix_path"
          echo "matrix=$(tr -d '\n' < "$matrix_path")" >> "$GITHUB_OUTPUT"

  build-test:
    name: build-test (${{ matrix.name }}, ${{ matrix.shard_index }}/${{ matrix.shard_count }}, ${{ matrix.target_count }} targets, ~${{ matrix.estimated_build_actions }} actions)
    needs: plan-build-test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-build-test.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: build

      - name: Setup sccache
        uses: ./.github/actions/setup/sccache

      - name: Enable Windows crash diagnostics
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dumpRoot = Join-Path $env:RUNNER_TEMP "wer-localdumps"
          $artifactRoot = Join-Path $env:RUNNER_TEMP "windows-diagnostics"
          New-Item -ItemType Directory -Force -Path $dumpRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null

          $werRoot = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps"
          New-Item -Path $werRoot -Force | Out-Null
          New-ItemProperty -Path $werRoot -Name DumpFolder -Value $dumpRoot -PropertyType ExpandString -Force | Out-Null
          New-ItemProperty -Path $werRoot -Name DumpType -Value 2 -PropertyType DWord -Force | Out-Null
          New-ItemProperty -Path $werRoot -Name DumpCount -Value 20 -PropertyType DWord -Force | Out-Null

          @(
            "dump_root=$dumpRoot"
            "artifact_root=$artifactRoot"
            "matrix_name=${{ matrix.name }}"
            "shard_index=${{ matrix.shard_index }}"
            "shard_count=${{ matrix.shard_count }}"
            "configure_preset=${{ matrix.configure_preset }}"
            "build_preset=${{ matrix.build_preset }}"
          ) | Out-File -FilePath (Join-Path $artifactRoot "diagnostics-context.txt") -Encoding utf8

      - name: Build and test
        shell: bash
        run: |
          python_bin="$(command -v python3 || command -v python)"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            set -x
            log_root="${RUNNER_TEMP}/windows-diagnostics"
            mkdir -p "${log_root}"
            log_file="${log_root}/build-test-${{ matrix.name }}-shard-${{ matrix.shard_index }}.log"
            "$python_bin" scripts/toolchain.py ci build-test \
              --configure-preset "${{ matrix.configure_preset }}" \
              --build-preset "${{ matrix.build_preset }}" \
              --shard-count "${{ matrix.shard_count }}" \
              --shard-index "${{ matrix.shard_index }}" \
              --include-label ci.pr \
              --exclude-label ci.nightly \
              2>&1 | tee "${log_file}"
            exit "${PIPESTATUS[0]}"
          fi

          "$python_bin" scripts/toolchain.py ci build-test \
            --configure-preset "${{ matrix.configure_preset }}" \
            --build-preset "${{ matrix.build_preset }}" \
            --shard-count "${{ matrix.shard_count }}" \
            --shard-index "${{ matrix.shard_index }}" \
            --include-label ci.pr \
            --exclude-label ci.nightly

      - name: Collect Windows diagnostics
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP "windows-diagnostics"
          $dumpRoot = Join-Path $env:RUNNER_TEMP "wer-localdumps"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null

          $eventLog = Join-Path $artifactRoot "application-error-events.txt"
          Get-WinEvent -FilterHashtable @{
            LogName = "Application"
            StartTime = (Get-Date).AddHours(-2)
          } -ErrorAction SilentlyContinue |
            Where-Object {
              $_.ProviderName -in @("Application Error", "Windows Error Reporting")
            } |
            Sort-Object TimeCreated |
            Format-List TimeCreated, ProviderName, Id, LevelDisplayName, Message |
            Out-File -FilePath $eventLog -Encoding utf8

          $dumpListing = Join-Path $artifactRoot "dump-files.txt"
          if (Test-Path $dumpRoot) {
            Get-ChildItem -Path $dumpRoot -Recurse -Force |
              Select-Object FullName, Length, LastWriteTimeUtc |
              Format-Table -AutoSize |
              Out-File -FilePath $dumpListing -Encoding utf8
          } else {
            "No dump directory found: $dumpRoot" | Out-File -FilePath $dumpListing -Encoding utf8
          }

      - name: Upload Windows diagnostics
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-diagnostics-${{ matrix.name }}-${{ matrix.shard_index }}
          path: |
            ${{ runner.temp }}/windows-diagnostics
            ${{ runner.temp }}/wer-localdumps
          if-no-files-found: warn
          retention-days: 7
