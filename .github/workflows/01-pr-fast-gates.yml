name: ci-01-pr-fast-gates

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-fast-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gates:
    uses: ./.github/workflows/reusable-fast-gates.yml
