name: ci-05-nightly-stress

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-stress-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        mode: [asan, ubsan, tsan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: nightly
          run_branch_guard: "false"

      - name: Nightly sanitizer ${{ matrix.mode }}
        uses: ./.github/actions/run/nightly-driver
        with:
          mode: sanitizer
          value: ${{ matrix.mode }}

  label-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        suite: [linearizability, stress, fuzz]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare CI job
        uses: ./.github/actions/prepare/job
        with:
          install_profile: nightly
          run_branch_guard: "false"

      - name: Nightly label ${{ matrix.suite }}
        uses: ./.github/actions/run/nightly-driver
        with:
          mode: label
          value: ${{ matrix.suite }}
