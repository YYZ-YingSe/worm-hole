name: ci-05-nightly-stress

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-stress-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stress:
    name: nightly-stress (${{ matrix.shard_index }})
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - shard_count: 3
            shard_index: 0
          - shard_count: 3
            shard_index: 1
          - shard_count: 3
            shard_index: 2

    uses: ./.github/workflows/reusable-build-test.yml
    with:
      mode: build-test
      runner_os: ubuntu-latest
      install_profile: nightly
      configure_preset: ci-linux-release
      build_preset: ci-linux-release
      shard_count: ${{ matrix.shard_count }}
      shard_index: ${{ matrix.shard_index }}
      include_label: ci.nightly
      timeout_minutes: 90
